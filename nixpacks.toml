[phases.setup]
nixPkgs = ["nodejs_22", "ffmpeg"]

[phases.install]
cmds = ["corepack enable && corepack prepare pnpm@10 --activate && pnpm install"]

[phases.build]
cmds = [
  "pnpm --filter @workspace/api-spec run codegen",
  "pnpm --filter @workspace/viral-clips run build",
  "pnpm --filter @workspace/api-server run build"
]

[start]
cmd = "pnpm --filter @workspace/api-server run start"
